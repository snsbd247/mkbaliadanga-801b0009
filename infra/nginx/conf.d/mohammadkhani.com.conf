# ---- HTTP → HTTPS redirect for all hosts ----
server {
  listen 80;
  server_name mohammadkhani.com www.mohammadkhani.com api.mohammadkhani.com files.mohammadkhani.com;
  return 301 https://$host$request_uri;
}

# ---- Frontend (React + Vite static build) ----
server {
  listen 443 ssl http2;
  server_name mohammadkhani.com www.mohammadkhani.com;

  ssl_certificate     /etc/letsencrypt/live/mohammadkhani.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mohammadkhani.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://web:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Public install.sh (curl-piped installer)
  location = /install.sh {
    proxy_pass http://web:80/install.sh;
    add_header Content-Type "text/x-shellscript";
  }
}

# ---- API (NestJS) + Socket.IO ----
server {
  listen 443 ssl http2;
  server_name api.mohammadkhani.com;

  ssl_certificate     /etc/letsencrypt/live/mohammadkhani.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mohammadkhani.com/privkey.pem;

  client_max_body_size 25m;

  # WebSocket / Socket.IO
  location /rt/ {
    proxy_pass http://api:3000/rt/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1h;
  }

  location / {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

# ---- MinIO (object storage) ----
server {
  listen 443 ssl http2;
  server_name files.mohammadkhani.com;

  ssl_certificate     /etc/letsencrypt/live/mohammadkhani.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mohammadkhani.com/privkey.pem;

  client_max_body_size 200m;

  location / {
    proxy_pass http://minio:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300;
    proxy_http_version 1.1;
    chunked_transfer_encoding off;
  }
}
