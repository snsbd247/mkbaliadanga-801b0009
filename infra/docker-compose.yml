version: "3.9"

networks:
  mk_net:
    name: mk_net
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  backups:

services:
  postgres:
    image: postgres:16-alpine
    container_name: mk_postgres
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [mk_net]

  redis:
    image: redis:7-alpine
    container_name: mk_redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks: [mk_net]

  minio:
    image: minio/minio:latest
    container_name: mk_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 15s
    networks: [mk_net]

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: mk_api
    restart: always
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      minio:    { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [mk_net]

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: mk_worker
    restart: always
    command: ["node", "dist/worker.js"]
    env_file: ../.env
    environment:
      WORKER_MODE: "true"
    depends_on:
      api: { condition: service_started }
    networks: [mk_net]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
        VITE_WS_URL:  ${API_URL}
        VITE_PUBLIC_FILES: ${FILES_URL}
    container_name: mk_web
    restart: always
    networks: [mk_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: mk_nginx
    restart: always
    depends_on: [api, web, minio]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [mk_net]
