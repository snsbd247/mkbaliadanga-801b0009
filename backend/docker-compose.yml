name: mkb-laravel

networks:
  mkb_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkb_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      minio:    { condition: service_started }
    networks: [mkb_net]

  nginx:
    build:
      context: ./docker/nginx
    container_name: mkb_nginx
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
    networks: [mkb_net]

  postgres:
    image: postgres:16-alpine
    container_name: mkb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mkb_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong}
      POSTGRES_DB: ${DB_DATABASE:-mkbaliadanga}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 6
    networks: [mkb_net]

  redis:
    image: redis:7-alpine
    container_name: mkb_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change_me_redis}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [mkb_net]

  minio:
    image: minio/minio:latest
    container_name: mkb_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-mkb_minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-change_me_minio}
    volumes:
      - minio_data:/data
    networks: [mkb_net]

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkb_queue
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=180", "--sleep=2"]
    depends_on: [app, redis, postgres]
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    networks: [mkb_net]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkb_scheduler
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          php /var/www/html/artisan schedule:run --no-interaction >> /var/log/scheduler.log 2>&1
          sleep 60
        done
    depends_on: [app, postgres, redis]
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    networks: [mkb_net]
