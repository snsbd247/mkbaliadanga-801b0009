_format_version: "2.1"
_transform: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths: ["/auth/v1/"]
    plugins:
      - name: cors

  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths: ["/rest/v1/"]
    plugins:
      - name: cors
      - name: key-auth
        config: { hide_credentials: true }
      - name: acl
        config: { hide_groups_header: true, allow: [admin, anon] }

  - name: realtime-v1
    url: http://supabase-realtime:4000/socket/
    routes:
      - name: realtime-v1
        strip_path: true
        paths: ["/realtime/v1/"]
    plugins:
      - name: cors
      - name: key-auth
        config: { hide_credentials: false }
      - name: acl
        config: { hide_groups_header: true, allow: [admin, anon] }

  - name: storage-v1
    url: http://supabase-storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths: ["/storage/v1/"]
    plugins:
      - name: cors

  - name: functions-v1
    url: http://supabase-functions:9000/
    routes:
      - name: functions-v1
        strip_path: true
        paths: ["/functions/v1/"]
    plugins:
      - name: cors

  - name: meta
    url: http://supabase-meta:8080/
    routes:
      - name: meta
        strip_path: true
        paths: ["/pg/"]
    plugins:
      - name: key-auth
        config: { hide_credentials: false }
      - name: acl
        config: { hide_groups_header: true, allow: [admin] }
