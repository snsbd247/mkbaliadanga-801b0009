name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci

      # i18n governance
      - name: i18n parity (EN ↔ BN)
        run: npm run i18n:check
      - name: i18n hardcoded-string scan (no regressions)
        run: npm run i18n:scan:ci
      - name: i18n unused-key report
        run: npm run i18n:unused:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: i18n-unused-report
          path: docs/i18n-unused-report.md

      # Lint
      - name: ESLint
        run: npm run lint

      # Unit tests
      - name: Vitest
        run: npm test

      # Build (catches type errors)
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-check
    if: ${{ secrets.E2E_BASE_URL != '' }}
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_COMMITTEE_EMAIL: ${{ secrets.E2E_COMMITTEE_EMAIL }}
      E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright (i18n smoke + real-time toggle + PDF localization)
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/

  api-smoke:
    runs-on: ubuntu-latest
    needs: build-and-check
    if: ${{ secrets.API_SMOKE_URL != '' }}
    env:
      API_URL: ${{ secrets.API_SMOKE_URL }}
      API_EMAIL: ${{ secrets.API_SMOKE_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.API_SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Laravel API smoke test
        run: node scripts/api-smoke.mjs

