name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    name: Land Transfer Integrity & Demo Presets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run regression test suites
        run: >-
          bunx vitest run
          src/lib/__tests__/landTransferIntegrity.test.ts
          src/lib/__tests__/demoPresets.test.ts
